<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register — ServiceHub</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
</head>
<body class="auth-body">
  <div class="auth-container">
    <!-- Left Panel -->
    <div class="auth-left auth-left-register">
      <a href="index.html" class="auth-logo">
        <i class="fas fa-layer-group"></i>
        <span>ServiceHub</span>
      </a>
      <div class="auth-left-content">
        <h2>Join ServiceHub Today</h2>
        <p>Create your account and start managing your service requests in minutes.</p>
        <div class="auth-features">
          <div class="auth-feat"><i class="fas fa-check-circle"></i> Free account setup</div>
          <div class="auth-feat"><i class="fas fa-check-circle"></i> Dedicated client dashboard</div>
          <div class="auth-feat"><i class="fas fa-check-circle"></i> 24/7 support access</div>
          <div class="auth-feat"><i class="fas fa-check-circle"></i> Real-time request tracking</div>
        </div>
      </div>
      <div class="auth-left-art">
        <div class="art-circle c1"></div>
        <div class="art-circle c2"></div>
        <div class="art-circle c3"></div>
      </div>
    </div>

    <!-- Right Panel -->
    <div class="auth-right">
      <div class="auth-form-wrap">
        <div class="auth-form-header">
          <h1>Create Account</h1>
          <p>Fill in your details to get started</p>
        </div>

        <div id="alert-box" class="alert hidden"></div>

        <form id="register-form" novalidate>
          <div class="form-row">
            <div class="form-group">
              <label for="name"><i class="fas fa-user"></i> Full Name *</label>
              <input type="text" id="name" placeholder="John Doe" required />
              <span class="field-error" id="name-error"></span>
            </div>
            <div class="form-group">
              <label for="company"><i class="fas fa-building"></i> Company</label>
              <input type="text" id="company" placeholder="Acme Corp" />
            </div>
          </div>

          <div class="form-group">
            <label for="email"><i class="fas fa-envelope"></i> Email Address *</label>
            <input type="email" id="email" placeholder="you@company.com" required />
            <span class="field-error" id="email-error"></span>
          </div>

          <div class="form-group">
            <label for="phone"><i class="fas fa-phone"></i> Phone Number</label>
            <input type="tel" id="phone" placeholder="+1 (555) 000-0000" />
          </div>

          <div class="form-row">
            <div class="form-group">
              <label for="password"><i class="fas fa-lock"></i> Password *</label>
              <div class="password-wrapper">
                <input type="password" id="password" placeholder="Min. 6 characters" required />
                <button type="button" class="toggle-password" onclick="togglePwd('password','eye1')">
                  <i class="fas fa-eye" id="eye1"></i>
                </button>
              </div>
              <span class="field-error" id="password-error"></span>
            </div>
            <div class="form-group">
              <label for="confirm"><i class="fas fa-lock"></i> Confirm Password *</label>
              <div class="password-wrapper">
                <input type="password" id="confirm" placeholder="Repeat password" required />
                <button type="button" class="toggle-password" onclick="togglePwd('confirm','eye2')">
                  <i class="fas fa-eye" id="eye2"></i>
                </button>
              </div>
              <span class="field-error" id="confirm-error"></span>
            </div>
          </div>

          <div class="password-strength-wrap">
            <div class="strength-bar">
              <div class="strength-fill" id="strength-fill"></div>
            </div>
            <span class="strength-label" id="strength-label"></span>
          </div>

          <div class="form-group terms-check">
            <label class="checkbox-label">
              <input type="checkbox" id="terms" required />
              I agree to the <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a>
            </label>
            <span class="field-error" id="terms-error"></span>
          </div>

          <button type="submit" class="btn-submit" id="submit-btn">
            <span class="btn-text"><i class="fas fa-user-plus"></i> Create Account</span>
            <span class="btn-loader hidden"><i class="fas fa-circle-notch fa-spin"></i> Creating...</span>
          </button>
        </form>

        <p class="auth-switch">Already have an account? <a href="login.html">Sign in</a></p>
      </div>
    </div>
  </div>

  <script src="js/auth.js"></script>
  <script>
    const token = localStorage.getItem('token');
    const user = JSON.parse(localStorage.getItem('user') || 'null');
    if (token && user) window.location.href = user.role === 'admin' ? 'admin.html' : 'dashboard.html';

    function togglePwd(id, iconId) {
      const inp = document.getElementById(id);
      const icon = document.getElementById(iconId);
      if (inp.type === 'password') { inp.type = 'text'; icon.className = 'fas fa-eye-slash'; }
      else { inp.type = 'password'; icon.className = 'fas fa-eye'; }
    }

    document.getElementById('password').addEventListener('input', function() {
      const val = this.value;
      const fill = document.getElementById('strength-fill');
      const label = document.getElementById('strength-label');
      let score = 0;
      if (val.length >= 6) score++;
      if (val.length >= 10) score++;
      if (/[A-Z]/.test(val)) score++;
      if (/[0-9]/.test(val)) score++;
      if (/[^A-Za-z0-9]/.test(val)) score++;
      const levels = ['', 'Very Weak', 'Weak', 'Fair', 'Strong', 'Very Strong'];
      const colors = ['', '#ef4444', '#f97316', '#eab308', '#22c55e', '#10b981'];
      fill.style.width = (score * 20) + '%';
      fill.style.background = colors[score] || '#e5e7eb';
      label.textContent = levels[score] || '';
      label.style.color = colors[score] || '';
    });

    document.getElementById('register-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      clearErrors();
      const name = document.getElementById('name').value.trim();
      const email = document.getElementById('email').value.trim();
      const phone = document.getElementById('phone').value.trim();
      const company = document.getElementById('company').value.trim();
      const password = document.getElementById('password').value;
      const confirm = document.getElementById('confirm').value;
      const terms = document.getElementById('terms').checked;
      let valid = true;

      if (!name) { showFieldError('name-error', 'Full name is required.'); valid = false; }
      if (!email) { showFieldError('email-error', 'Email is required.'); valid = false; }
      else if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) { showFieldError('email-error', 'Enter a valid email.'); valid = false; }
      if (!password) { showFieldError('password-error', 'Password is required.'); valid = false; }
      else if (password.length < 6) { showFieldError('password-error', 'Password must be at least 6 characters.'); valid = false; }
      if (password !== confirm) { showFieldError('confirm-error', 'Passwords do not match.'); valid = false; }
      if (!terms) { showFieldError('terms-error', 'You must accept the terms.'); valid = false; }
      if (!valid) return;

      setLoading(true);
      try {
        const res = await fetch('/api/auth/register', {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, email, password, company, phone })
        });
        const data = await res.json();
        if (!res.ok) { showAlert(data.error || 'Registration failed.', 'error'); return; }
        localStorage.setItem('token', data.token);
        localStorage.setItem('user', JSON.stringify(data.user));
        showAlert('Account created! Redirecting to dashboard...', 'success');
        setTimeout(() => window.location.href = 'dashboard.html', 1200);
      } catch {
        showAlert('Network error. Please check your connection.', 'error');
      } finally { setLoading(false); }
    });
  </script>
</body>
</html>
